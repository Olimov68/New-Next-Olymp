<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 794 1122" width="794" height="1122">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0e0"/>
      <stop offset="100%" stop-color="#efe8d4"/>
    </linearGradient>
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c5a55a"/>
      <stop offset="50%" stop-color="#ddc278"/>
      <stop offset="100%" stop-color="#c5a55a"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c5a55a"/>
      <stop offset="50%" stop-color="#ddc278"/>
      <stop offset="100%" stop-color="#c5a55a"/>
    </linearGradient>

    <!-- Islamic/Central Asian geometric tile pattern -->
    <pattern id="borderPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <!-- Octagon and cross pattern -->
      <rect width="40" height="40" fill="none"/>
      <polygon points="12,0 28,0 40,12 40,28 28,40 12,40 0,28 0,12" fill="none" stroke="#c5a55a" stroke-width="0.8" opacity="0.4"/>
      <rect x="16" y="16" width="8" height="8" transform="rotate(45,20,20)" fill="none" stroke="#c5a55a" stroke-width="0.6" opacity="0.3"/>
      <circle cx="20" cy="20" r="2" fill="#c5a55a" opacity="0.2"/>
    </pattern>

    <pattern id="innerPattern" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="none"/>
      <path d="M12,0 L24,12 L12,24 L0,12 Z" fill="none" stroke="#c5a55a" stroke-width="0.4" opacity="0.15"/>
      <circle cx="12" cy="12" r="1.5" fill="#c5a55a" opacity="0.08"/>
    </pattern>

    <!-- Corner rosette -->
    <g id="rosette">
      <g fill="none" stroke="#c5a55a" stroke-width="0.8" opacity="0.5">
        <circle cx="0" cy="0" r="15"/>
        <circle cx="0" cy="0" r="10"/>
        <circle cx="0" cy="0" r="5"/>
        <!-- 8-pointed star -->
        <polygon points="0,-14 4,-4 14,0 4,4 0,14 -4,4 -14,0 -4,-4"/>
        <!-- Inner 8-pointed star -->
        <polygon points="0,-9 2.5,-2.5 9,0 2.5,2.5 0,9 -2.5,2.5 -9,0 -2.5,-2.5" opacity="0.4"/>
      </g>
      <circle cx="0" cy="0" r="2" fill="#c5a55a" opacity="0.3"/>
    </g>

    <!-- Watermark pattern -->
    <pattern id="watermark" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <text x="60" y="60" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, serif" font-size="8" fill="#c5a55a" opacity="0.04" transform="rotate(-30,60,60)">NEXTOLYMP</text>
    </pattern>
  </defs>

  <!-- Main background -->
  <rect width="794" height="1122" fill="url(#bgGrad)"/>

  <!-- Subtle watermark -->
  <rect width="794" height="1122" fill="url(#watermark)"/>

  <!-- Outer border frame with pattern -->
  <rect x="25" y="25" width="744" height="1072" fill="none" stroke="#c5a55a" stroke-width="3" opacity="0.6"/>
  <rect x="30" y="30" width="734" height="1062" fill="none" stroke="#c5a55a" stroke-width="1" opacity="0.3"/>

  <!-- Geometric border band -->
  <rect x="35" y="35" width="724" height="1052" fill="url(#borderPattern)" opacity="0.3"/>
  <!-- Clear the inner area -->
  <rect x="55" y="55" width="684" height="1012" fill="url(#bgGrad)"/>

  <!-- Inner decorative border -->
  <rect x="55" y="55" width="684" height="1012" fill="none" stroke="#c5a55a" stroke-width="1.5" opacity="0.4"/>
  <rect x="60" y="60" width="674" height="1002" fill="none" stroke="#c5a55a" stroke-width="0.5" opacity="0.2"/>

  <!-- Inner area subtle pattern -->
  <rect x="60" y="60" width="674" height="1002" fill="url(#innerPattern)"/>

  <!-- Corner rosettes -->
  <use href="#rosette" transform="translate(55,55)"/>
  <use href="#rosette" transform="translate(739,55)"/>
  <use href="#rosette" transform="translate(55,1067)"/>
  <use href="#rosette" transform="translate(739,1067)"/>

  <!-- Mid-side ornaments -->
  <use href="#rosette" transform="translate(55,561) scale(0.7)"/>
  <use href="#rosette" transform="translate(739,561) scale(0.7)"/>

  <!-- Top emblem area - coat of arms style circle with star -->
  <g transform="translate(397, 140)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#c5a55a" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#c5a55a" stroke-width="0.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#c5a55a" stroke-width="0.5" opacity="0.2"/>

    <!-- Decorative dots around the circle -->
    <g opacity="0.3">
      <circle cx="0" cy="-48" r="1.5" fill="#c5a55a"/>
      <circle cx="24" cy="-41.6" r="1.5" fill="#c5a55a"/>
      <circle cx="41.6" cy="-24" r="1.5" fill="#c5a55a"/>
      <circle cx="48" cy="0" r="1.5" fill="#c5a55a"/>
      <circle cx="41.6" cy="24" r="1.5" fill="#c5a55a"/>
      <circle cx="24" cy="41.6" r="1.5" fill="#c5a55a"/>
      <circle cx="0" cy="48" r="1.5" fill="#c5a55a"/>
      <circle cx="-24" cy="41.6" r="1.5" fill="#c5a55a"/>
      <circle cx="-41.6" cy="24" r="1.5" fill="#c5a55a"/>
      <circle cx="-48" cy="0" r="1.5" fill="#c5a55a"/>
      <circle cx="-41.6" cy="-24" r="1.5" fill="#c5a55a"/>
      <circle cx="-24" cy="-41.6" r="1.5" fill="#c5a55a"/>
    </g>

    <!-- Central star -->
    <polygon points="0,-30 7,-10 28,-10 12,3 18,24 0,12 -18,24 -12,3 -28,-10 -7,-10" fill="none" stroke="#c5a55a" stroke-width="1.2" opacity="0.5"/>
    <polygon points="0,-18 4,-6 17,-6 7,2 11,14 0,7 -11,14 -7,2 -17,-6 -4,-6" fill="#c5a55a" opacity="0.1" stroke="#c5a55a" stroke-width="0.5" stroke-opacity="0.3"/>
    <circle cx="0" cy="0" r="5" fill="#c5a55a" opacity="0.15" stroke="#c5a55a" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- Wheat/cotton sprigs suggestion -->
    <g opacity="0.35" fill="none" stroke="#c5a55a" stroke-width="0.8">
      <!-- Left sprig -->
      <path d="M-20,50 C-25,40 -30,30 -28,20"/>
      <ellipse cx="-31" cy="28" rx="4" ry="2" transform="rotate(-60,-31,28)"/>
      <ellipse cx="-29" cy="35" rx="4" ry="2" transform="rotate(-50,-29,35)"/>
      <ellipse cx="-25" cy="42" rx="4" ry="2" transform="rotate(-40,-25,42)"/>
      <!-- Right sprig -->
      <path d="M20,50 C25,40 30,30 28,20"/>
      <ellipse cx="31" cy="28" rx="4" ry="2" transform="rotate(60,31,28)"/>
      <ellipse cx="29" cy="35" rx="4" ry="2" transform="rotate(50,29,35)"/>
      <ellipse cx="25" cy="42" rx="4" ry="2" transform="rotate(40,25,42)"/>
    </g>
  </g>

  <!-- O'ZBEKISTON header area -->
  <text x="397" y="225" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#8b7640" letter-spacing="6" opacity="0.5">O'ZBEKISTON RESPUBLIKASI</text>

  <!-- Decorative separator -->
  <g transform="translate(397, 240)" opacity="0.4">
    <line x1="-120" y1="0" x2="-15" y2="0" stroke="#c5a55a" stroke-width="0.8"/>
    <polygon points="0,-3 3,0 0,3 -3,0" fill="#c5a55a"/>
    <line x1="15" y1="0" x2="120" y2="0" stroke="#c5a55a" stroke-width="0.8"/>
  </g>

  <!-- SERTIFIKAT header placeholder -->
  <text x="397" y="280" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#8b7640" letter-spacing="4" opacity="0.35">SERTIFIKAT</text>

  <!-- Decorative separator under SERTIFIKAT -->
  <g transform="translate(397, 295)" opacity="0.25">
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#c5a55a" stroke-width="0.5"/>
  </g>

  <!-- Field lines area -->
  <g opacity="0.2" stroke="#c5a55a" stroke-width="0.5">
    <!-- Sertifikat raqami -->
    <line x1="130" y1="350" x2="664" y2="350"/>
    <!-- F.I.Sh -->
    <line x1="130" y1="420" x2="664" y2="420"/>
    <!-- Fan -->
    <line x1="130" y1="490" x2="664" y2="490"/>
    <!-- Ball -->
    <line x1="130" y1="560" x2="664" y2="560"/>
    <!-- Daraja -->
    <line x1="130" y1="630" x2="664" y2="630"/>
  </g>

  <!-- Field labels (very subtle) -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#b0a080" opacity="0.25">
    <text x="90" y="345">Sertifikat raqami:</text>
    <text x="90" y="415">F.I.Sh:</text>
    <text x="90" y="485">Fan:</text>
    <text x="90" y="555">Ball:</text>
    <text x="90" y="625">Daraja:</text>
  </g>

  <!-- Bottom section separator -->
  <g transform="translate(397, 750)" opacity="0.25">
    <line x1="-250" y1="0" x2="-15" y2="0" stroke="#c5a55a" stroke-width="0.5"/>
    <polygon points="0,-2 2,0 0,2 -2,0" fill="#c5a55a"/>
    <line x1="15" y1="0" x2="250" y2="0" stroke="#c5a55a" stroke-width="0.5"/>
  </g>

  <!-- QR code area (bottom left) -->
  <rect x="100" y="900" width="90" height="90" rx="4" fill="none" stroke="#c5a55a" stroke-width="0.8" opacity="0.15" stroke-dasharray="4,4"/>

  <!-- Director signature area (bottom center-right) -->
  <g opacity="0.2">
    <line x1="400" y1="960" x2="650" y2="960" stroke="#c5a55a" stroke-width="0.5"/>
    <text x="525" y="975" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#b0a080">Direktor imzosi</text>
  </g>

  <!-- Stamp area (bottom right) -->
  <circle cx="650" cy="920" r="30" fill="none" stroke="#c5a55a" stroke-width="0.5" opacity="0.1" stroke-dasharray="3,3"/>
  <text x="650" y="923" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#c5a55a" opacity="0.1">M.O'.</text>

  <!-- Date area -->
  <g opacity="0.2">
    <line x1="100" y1="1020" x2="300" y2="1020" stroke="#c5a55a" stroke-width="0.5"/>
    <text x="200" y="1035" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#b0a080">Sana</text>
  </g>

  <!-- Bottom border accent -->
  <g transform="translate(397, 1050)" opacity="0.3">
    <line x1="-100" y1="0" x2="-8" y2="0" stroke="#c5a55a" stroke-width="0.8"/>
    <polygon points="0,-3 3,0 0,3 -3,0" fill="#c5a55a"/>
    <line x1="8" y1="0" x2="100" y2="0" stroke="#c5a55a" stroke-width="0.8"/>
  </g>
</svg>